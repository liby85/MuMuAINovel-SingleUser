name: 🔄 Sync from Upstream & Build Docker Image

on:
  schedule:
    # 每周日凌晨 2 点自动检查更新（UTC时间）
    - cron: '0 2 * * 0'
  
  # 支持手动触发（在 GitHub UI 中点击 "Run workflow"）
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（即使没有更新）'
        required: false
        default: 'false'
        type: boolean

env:
  DOCKER_USERNAME: liby85
  IMAGE_NAME: mumuainovel-singleuser
  UPSTREAM_REPO: xiamuceer-j/MuMuAINovel

jobs:
  # 阶段 1: 检查上游更新
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
    
    steps:
      - name: 📦 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔍 检查上游更新
        id: check
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream
          
          # 获取最新提交
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          CURRENT_HEAD=$(git rev-parse HEAD)
          
          echo "上游最新提交: $UPSTREAM_HEAD"
          echo "当前仓库提交: $CURRENT_HEAD"
          
          # 检查是否有新提交
          if [[ "$UPSTREAM_HEAD" != "$CURRENT_HEAD" ]]; then
            echo "发现上游更新！"
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "upstream_sha=$UPSTREAM_HEAD" >> $GITHUB_OUTPUT
          else
            echo "没有发现新更新。"
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "upstream_sha=$CURRENT_HEAD" >> $GITHUB_OUTPUT
          fi
          
      - name: 🏷️ 记录上游版本信息
        if: ${{ steps.check.outputs.has_updates == 'true' }}
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream
          git log --oneline upstream/main -3

  # 阶段 2: 合并上游并应用补丁
  merge-and-patch:
    runs-on: ubuntu-latest
    needs: check-updates
    if: ${{ needs.check-updates.outputs.has_updates == 'true' || github.event.inputs.force_rebuild == 'true' }}
    
    steps:
      - name: 📦 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 👤 配置 Git 用户
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
      
      - name: 🔄 合并上游代码
        id: merge
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream
          
          # 尝试合并
          if git merge upstream/main --no-commit; then
            echo "合并成功"
            echo "merge_success=true" >> $GITHUB_OUTPUT
          else
            echo "自动合并失败，需要手动处理冲突"
            echo "merge_success=false" >> $GITHUB_OUTPUT
            
            # 显示冲突文件
            git status
            exit 1
          fi
      
      - name: 🛠️ 应用单用户化补丁
        if: steps.merge.outputs.merge_success == 'true'
        run: |
          chmod +x .github/scripts/apply-patches.sh
          ./.github/scripts/apply-patches.sh
          
          # 显示修改状态
          git status
      
      - name: 📝 创建提交
        if: steps.merge.outputs.merge_success == 'true'
        run: |
          UPSTREAM_SHA=${{ needs.check-updates.outputs.upstream_sha }}
          SHORT_SHA=${UPSTREAM_SHA:0:8}
          
          git add -A
          
          if git diff --staged --quiet; then
            echo "没有变化需要提交"
          else
            git commit -m "🔀 sync: merge from upstream @${SHORT_SHA}"
            
            # 创建新分支
            MERGE_BRANCH="sync-${SHORT_SHA}-$(date +%Y%m%d)"
            git checkout -b $MERGE_BRANCH
          fi
      
      - name: 📤 推送合并分支
        if: steps.merge.outputs.merge_success == 'true'
        run: |
          UPSTREAM_SHA=${{ needs.check-updates.outputs.upstream_sha }}
          SHORT_SHA=${UPSTREAM_SHA:0:8}
          MERGE_BRANCH="sync-${SHORT_SHA}-$(date +%Y%m%d)"
          
          git push origin $MERGE_BRANCH
          echo "合并分支已推送: $MERGE_BRANCH"
      
      - name: 📧 发送合并结果通知
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            ${{ steps.merge.outputs.merge_success == 'true' && '✅ 合并成功' || '❌ 合并失败' }} - 
            MuMuAINovel-SingleUser 同步结果
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            同步任务执行结果:
            
            仓库: liby85/MuMuAINovel-SingleUser
            上游仓库: xiamuceer-j/MuMuAINovel
            
            上游 SHA: ${{ needs.check-updates.outputs.upstream_sha }}
            合并状态: ${{ steps.merge.outputs.merge_success }}
            构建状态: ${{ job.status }}
            
            GitHub Actions 链接: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # 阶段 3: 构建并推送 Docker 镜像
  build-and-push:
    runs-on: ubuntu-latest
    needs: merge-and-patch
    if: ${{ needs.merge-and-patch.outputs.merge_success == 'true' }}
    
    steps:
      - name: 📦 检出合并后的代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: 🐳 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 📋 生成构建报告
        run: |
          echo "🎉 Docker 镜像构建完成！"
          echo "镜像标签:"
          echo "  - ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "  - ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.run_id }}"
          echo ""
          echo "💡 拉取命令:"
          echo "docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
      
      - name: 📊 创建 Pull Request（可选）
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          base: main
          title: "🔀 Sync from upstream - ${{ github.run_id }}"
          body: |
            本次同步包含以下更新：
            
            - 合并自上游仓库: xiamuceer-j/MuMuAINovel
            - 应用了单用户化补丁
            - 已构建 Docker 镜像并推送到 Docker Hub
            
            需要审核后合并到主分支。